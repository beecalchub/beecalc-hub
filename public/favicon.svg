<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD066"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <!-- Hexagon -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="url(#g)" stroke="#D4891A" stroke-width="2"/>
  <!-- Bee body -->
  <ellipse cx="32" cy="30" rx="10" ry="13" fill="#2B1A05"/>
  <rect x="24" y="22" width="16" height="3" rx="1" fill="#FFD066"/>
  <rect x="24" y="28" width="16" height="3" rx="1" fill="#FFD066"/>
  <rect x="24" y="34" width="16" height="3" rx="1" fill="#FFD066"/>
  <!-- Wings -->
  <ellipse cx="22" cy="22" rx="7" ry="5" fill="white" fill-opacity="0.7" transform="rotate(-20,22,22)"/>
  <ellipse cx="42" cy="22" rx="7" ry="5" fill="white" fill-opacity="0.7" transform="rotate(20,42,22)"/>
  <!-- Head -->
  <circle cx="32" cy="17" r="5" fill="#2B1A05"/>
  <!-- Eyes -->
  <circle cx="30" cy="16" r="1.2" fill="#FFD066"/>
  <circle cx="34" cy="16" r="1.2" fill="#FFD066"/>
  <!-- Antennae -->
  <line x1="30" y1="13" x2="26" y2="8" stroke="#2B1A05" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="13" x2="38" y2="8" stroke="#2B1A05" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="26" cy="8" r="1.5" fill="#2B1A05"/>
  <circle cx="38" cy="8" r="1.5" fill="#2B1A05"/>
  <!-- Stinger -->
  <polygon points="32,43 30,47 34,47" fill="#2B1A05"/>
</svg>
